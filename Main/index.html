<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Strongest Battle Grounds — 3D Map Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <div id="topbar">
      <h1>Strongest Battle Grounds — 3D Map Demo</h1>
      <div class="controls">
        <button id="openMapper">Open Mapper (edit zones)</button>
        <button id="spawnNow">Spawn Enemy</button>
      </div>
    </div>
    <div id="info">Spawned: <span id="spawnCount">0</span></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="glcanvas"></canvas>
  </div>

  <script src="https://unpkg.com/three@0.152.0/build/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
