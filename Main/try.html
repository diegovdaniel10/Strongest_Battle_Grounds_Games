<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Open Updated Demo</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:36px}
    button{font-size:18px;padding:12px 18px}
    .msg{margin-bottom:16px}
  </style>
</head>
<body>
  <div class="msg">This page will try to open the updated demo in a new tab.</div>
  <button id="openBtn">Open updated demo</button>
  <p id="fallback" style="display:none;margin-top:12px">If the demo didn't open, <a id="directLink" href="index.html" target="_blank" rel="noopener">click here</a>.</p>

  <script>
    function tryOpen() {
      // Attempt to open the demo in a new tab. Browsers may block popups unless triggered by user gesture.
      var w = window.open('/Main/index.html', '_blank', 'noopener');
      if (w) {
        document.querySelector('.msg').textContent = 'Demo opened in a new tab.';
        document.getElementById('openBtn').style.display = 'none';
        document.getElementById('fallback').style.display = 'none';
      } else {
        document.querySelector('.msg').textContent = 'Popup was blocked — please click the button below to open the demo.';
        document.getElementById('fallback').style.display = 'block';
      }
    }

    // Attach to user button (trusted user gesture) and also try once on load.
    document.getElementById('openBtn').addEventListener('click', tryOpen);
    window.addEventListener('load', function(){
      // Try immediate open; if blocked, user can click the button.
      tryOpen();
    });
  </script>
</body>
</html>
